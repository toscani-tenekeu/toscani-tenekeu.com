server {
    listen 80;
    listen [::]:80;
    server_name toscani-tenekeu.com;

    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name toscani-tenekeu.com;

    ssl_certificate /etc/letsencrypt/live/toscani-tenekeu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toscani-tenekeu.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:toscani_site_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/toscani-tenekeu.com.access.log;
    error_log /var/log/nginx/toscani-tenekeu.com.error.log;
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:1246;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
